name: Daily YouTube Data Fetch

on:
  # 1. 当代码推送到 main 分支时触发
  push:
    branches: [ "main" ]
  
  # 2. 定时触发：每天 00:00 UTC (北京时间 8:00)
  schedule:
    - cron: '0 0 * * *'
    
  # 3. 允许在 GitHub Actions 页面手动触发
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script to fetch YouTube data
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python main.py

      - name: Commit and push database changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add youtube_data.db
          # 检查是否有文件变动，只有在有变动时才执行 commit
          git diff --staged --quiet || git commit -m "Update YouTube data"
          git push
